<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Агенты - Управление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1322;
        }

        ::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 10px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: #4b5563;
            }

        .app {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 360px;
            min-width: 360px;
            background: #111827;
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            background: #0f1724;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

            .sidebar-header h1 {
                font-size: 20px;
                font-weight: 700;
                background: linear-gradient(135deg, #667eea, #764ba2);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

        .btn-create {
            padding: 8px 16px;
            font-size: 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            white-space: nowrap;
        }

            .btn-create:hover {
                transform: scale(1.05);
            }

        .agents-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .agent-item {
            display: flex;
            align-items: center;
            padding: 14px;
            margin-bottom: 8px;
            background: #1a2332;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
            position: relative;
        }

            .agent-item:hover {
                background: #243041;
                transform: translateX(4px);
            }

            .agent-item.active {
                border-color: #667eea;
                background: #1e2a42;
            }

        .agent-icon {
            font-size: 28px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .agent-info {
            flex: 1;
            min-width: 0;
        }

        .agent-name {
            font-size: 15px;
            font-weight: 600;
            color: #f0f0f0;
        }

        .agent-details {
            display: flex;
            gap: 10px;
            margin-top: 4px;
            font-size: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .agent-path {
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .agent-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .btn-icon {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
            font-size: 16px;
            color: #9ca3af;
        }

            .btn-icon:hover {
                background: #374151;
                color: #e5e7eb;
            }

        .btn-delete:hover {
            background: #4c1d1d;
            color: #f87171;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 16px;
        }

        .empty-hint {
            font-size: 13px;
            margin-top: 8px;
            color: #4b5563;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0e17;
            overflow: hidden;
        }

        .welcome-screen {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-content {
            text-align: center;
            color: #6b7280;
        }

        .welcome-icon {
            font-size: 80px;
            display: block;
            margin-bottom: 20px;
        }

        .welcome-content h2 {
            color: #e5e7eb;
            margin-bottom: 8px;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 16px 24px;
            background: #111827;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-agent-icon {
            font-size: 32px;
        }

        .chat-agent-name {
            font-size: 18px;
            font-weight: 600;
            color: #f0f0f0;
        }

        .chat-agent-status {
            font-size: 13px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

            .status-dot.running {
                background: #4ade80;
                animation: pulse 1.5s infinite;
            }

            .status-dot.stopped {
                background: #6b7280;
            }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .chat-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-run {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            background: #0d2818;
            color: #4ade80;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

            .btn-run:hover {
                background: #1a3a2a;
                transform: scale(1.05);
            }

        .btn-stop {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            background: #2d1a1a;
            color: #f87171;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

            .btn-stop:hover {
                background: #3d2a2a;
                transform: scale(1.05);
            }

        .btn-clear-history {
            padding: 6px 14px;
            border: 1px solid #4c1d1d;
            border-radius: 6px;
            background: transparent;
            color: #f87171;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

            .btn-clear-history:hover {
                background: #2d1a1a;
            }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: #0d1322;
        }

        .message {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

            .message.user {
                justify-content: flex-end;
            }

            .message.agent {
                justify-content: flex-start;
            }

            .message.system {
                justify-content: center;
            }

                .message.system .message-bubble {
                    background: #1a2332;
                    color: #9ca3af;
                    font-size: 13px;
                    padding: 8px 16px;
                    border-radius: 20px;
                }

        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 16px;
            background: #1a2332;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.agent .message-bubble {
            background: #1e2a42;
            color: #e5e7eb;
            border-bottom-left-radius: 4px;
        }

        .message-sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .message-content {
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message-time {
            font-size: 11px;
            margin-top: 6px;
            opacity: 0.5;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

            .typing-indicator span {
                display: inline-block;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #6b7280;
                animation: typingBounce 1.4s infinite;
            }

                .typing-indicator span:nth-child(2) {
                    animation-delay: 0.2s;
                }

                .typing-indicator span:nth-child(3) {
                    animation-delay: 0.4s;
                }

        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-8px);
            }
        }

        .message.typing .message-bubble {
            background: #1a2332;
            padding: 12px 20px;
        }

        .chat-input {
            padding: 16px 24px;
            background: #111827;
            border-top: 1px solid #1f2937;
            display: flex;
            gap: 12px;
            flex-shrink: 0;
        }

            .chat-input input {
                flex: 1;
                padding: 12px 18px;
                border: 1px solid #1f2937;
                border-radius: 12px;
                background: #0d1322;
                color: #e5e7eb;
                font-size: 14px;
                outline: none;
                transition: border-color 0.3s;
            }

                .chat-input input:focus {
                    border-color: #667eea;
                }

                .chat-input input::placeholder {
                    color: #4b5563;
                }

                .chat-input input:disabled {
                    opacity: 0.5;
                    cursor: not-allowed;
                }

        .btn-send {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .btn-send:hover:not(:disabled) {
                transform: scale(1.05);
            }

            .btn-send:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

        .load-more-btn {
            text-align: center;
            padding: 12px;
            cursor: pointer;
            color: #667eea;
            transition: all 0.3s;
            border-radius: 8px;
            margin-bottom: 16px;
        }

            .load-more-btn:hover {
                background: #1a2332;
                color: #8b9eef;
            }

            .load-more-btn .spinner {
                display: none;
                width: 16px;
                height: 16px;
                border: 2px solid #1f2937;
                border-top-color: #667eea;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                margin: 0 auto;
            }

            .load-more-btn.loading .spinner {
                display: inline-block;
            }

            .load-more-btn.loading .text {
                display: none;
            }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

            .modal-overlay.open {
                display: flex;
            }

        .modal-content {
            background: #1a2332;
            border-radius: 16px;
            width: 500px;
            max-width: 92%;
            display: flex;
            flex-direction: column;
            border: 1px solid #2d3a4a;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .modal-header h2 {
                color: #f0f0f0;
                font-size: 20px;
            }

        .btn-close-modal {
            background: transparent;
            border: none;
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

            .btn-close-modal:hover {
                color: #f0f0f0;
            }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

            .form-group:last-child {
                margin-bottom: 0;
            }

            .form-group label {
                display: block;
                color: #9ca3af;
                font-size: 13px;
                font-weight: 500;
                margin-bottom: 6px;
            }

            .form-group input {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid #1f2937;
                border-radius: 8px;
                background: #0d1322;
                color: #e5e7eb;
                font-size: 14px;
                outline: none;
                transition: border-color 0.3s;
            }

                .form-group input:focus {
                    border-color: #667eea;
                }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid #1f2937;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-secondary {
            padding: 10px 20px;
            border: 1px solid #1f2937;
            border-radius: 8px;
            background: transparent;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s;
        }

            .btn-secondary:hover {
                background: #1f2937;
            }

        .btn-primary {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

            .btn-primary:hover {
                transform: scale(1.05);
            }

            .btn-primary:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
            }

        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
                min-width: 280px;
            }
        }

        @media (max-width: 640px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-width: 100%;
                height: 40vh;
                border-right: none;
                border-bottom: 1px solid #1f2937;
            }

            .main-content {
                height: 60vh;
            }

            .message-bubble {
                max-width: 90%;
            }

            .chat-header {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .chat-actions {
                width: 100%;
                justify-content: flex-end;
                flex-wrap: wrap;
            }

            .chat-input {
                padding: 12px 16px;
                flex-wrap: wrap;
            }

            .btn-send {
                width: 100%;
                justify-content: center;
            }

            .modal-content {
                width: 95%;
            }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #1f2937;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 48px 14px 24px;
            border-radius: 12px;
            background: #1a2332;
            border: 1px solid #1f2937;
            color: #e5e7eb;
            font-size: 14px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            max-width: 420px;
            min-width: 200px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            position: fixed;
            word-wrap: break-word;
            line-height: 1.4;
        }

            .toast .toast-close {
                position: absolute;
                top: 50%;
                right: 12px;
                transform: translateY(-50%);
                background: transparent;
                border: none;
                color: #6b7280;
                font-size: 18px;
                cursor: pointer;
                padding: 4px 8px;
                border-radius: 4px;
                transition: all 0.2s;
                line-height: 1;
            }

                .toast .toast-close:hover {
                    color: #e5e7eb;
                    background: rgba(255, 255, 255, 0.1);
                }

            .toast.error {
                border-color: #f87171;
                color: #f87171;
            }

            .toast.success {
                border-color: #4ade80;
                color: #4ade80;
            }

            .toast.info {
                border-color: #667eea;
                color: #667eea;
            }

        .agent-status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            flex-shrink: 0;
        }

            .agent-status-dot.running {
                background: #4ade80;
                animation: pulse 1.5s infinite;
            }

            .agent-status-dot.stopped {
                background: #6b7280;
            }

        .agent-status-text {
            font-size: 11px;
            color: #9ca3af;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🤖 AI Агенты</h1>
                <button class="btn-create" onclick="openCreateModal()">
                    <span>+</span> Новый
                </button>
            </div>
            <div class="agents-list" id="agentsList">
            </div>
        </div>

        <div class="main-content">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-content">
                    <span class="welcome-icon">🤖</span>
                    <h2>Выберите агента</h2>
                    <p>Выберите существующего агента из списка слева или создайте нового</p>
                </div>
            </div>

            <div class="chat-container" id="chatContainer" style="display:none;">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <span class="chat-agent-icon" id="chatAgentIcon">🤖</span>
                        <div>
                            <div class="chat-agent-name" id="chatAgentName">Агент</div>
                            <div class="chat-agent-status">
                                <span class="status-dot stopped" id="statusDot"></span>
                                <span id="statusText">Остановлен</span>
                            </div>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="btn-run" id="btnRun" onclick="startAgent()">
                            <span>▶</span> Запустить
                        </button>
                        <button class="btn-stop" id="btnStop" onclick="stopAgent()" style="display:none;">
                            <span>⏹</span> Остановить
                        </button>
                        <button class="btn-clear-history" id="btnClearHistory" onclick="clearHistory()" style="display:none;">
                            🗑️ Очистить историю
                        </button>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer">
                </div>

                <div class="chat-input">
                    <input type="text"
                           id="chatInput"
                           placeholder="Введите запрос..."
                           onkeydown="if(event.key==='Enter') sendMessage()"
                           disabled />
                    <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>
                        <span>📤</span> Отправить
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="createModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Создание нового агента</h2>
                <button class="btn-close-modal" onclick="closeCreateModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Название агента</label>
                    <input type="text" id="agentNameInput" placeholder="Например: Помощник по БД" />
                </div>
                <div class="form-group">
                    <label>Путь к .exe файлу</label>
                    <input type="text" id="agentPathInput" placeholder="C:\Users\...\AiAgent.exe" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeCreateModal()">Отмена</button>
                <button class="btn-primary" id="btnCreateAgent" onclick="createAgent()">Создать</button>
            </div>
        </div>
    </div>

    <script>

        const API_BASE = 'http://localhost:5000/api/agents';
        const SIGNALR_URL = 'http://localhost:5000/agentHub';

        let selectedAgentName = null;
        let selectedChatId = null;
        let isAgentRunning = false;
        let connection = null;
        let pollingInterval = null;

        let agentStatuses = new Map();

        let historyState = {
            offset: 0,
            limit: 50,
            total: 0,
            messages: [],
            isLoading: false,
            hasMore: true,
            chatName: null
        };

        async function apiRequest(method, endpoint, data = null) {
            const options = {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                credentials: 'include'
            };

            if (data !== null) {
                options.body = JSON.stringify(data);
            }

            const res = await fetch(`${API_BASE}${endpoint}`, options);

            if (!res.ok) {
                let errorText;
                try {
                    const errorData = await res.json();
                    errorText = errorData.message || errorData.error || res.statusText;
                } catch {
                    errorText = await res.text() || res.statusText;
                }
                throw new Error(errorText);
            }

            const contentLength = res.headers.get('content-length');
            if (contentLength === '0') {
                return null;
            }

            return res.json();
        }

        async function apiGet(endpoint) {
            return apiRequest('GET', endpoint);
        }

        async function apiPost(endpoint, data) {
            return apiRequest('POST', endpoint, data);
        }

        async function apiDelete(endpoint) {
            return apiRequest('DELETE', endpoint);
        }

        async function loadAgents() {
            try {
                const agents = await apiGet('');
                renderAgents(agents);
            } catch (err) {
                showToast('Ошибка загрузки агентов: ' + err.message, 'error');
            }
        }

        function renderAgents(agents) {
            const container = document.getElementById('agentsList');

            if (!agents || agents.length === 0) {
                container.innerHTML = `
                                <div class="empty-state">
                                    <span class="empty-icon">📭</span>
                                    <p>Нет созданных агентов</p>
                                    <p class="empty-hint">Создайте первого агента, нажав кнопку выше</p>
                                </div>
                            `;
                return;
            }

            container.innerHTML = agents.map(a => {
                const isRunning = agentStatuses.get(a.name) || false;
                return `
                            <div class="agent-item ${selectedAgentName === a.name ? 'active' : ''}"
                                 onclick="selectAgent('${escapeHtml(a.name)}')">
                                <div class="agent-icon">🤖</div>
                                <div class="agent-info">
                                    <div class="agent-name">${escapeHtml(a.name)}</div>
                                    <div class="agent-details">
                                        <span style="display:flex;align-items:center;gap:4px;">
                                            <span class="agent-status-dot ${isRunning ? 'running' : 'stopped'}"></span>
                                            <span class="agent-status-text">${isRunning ? 'Запущен' : 'Остановлен'}</span>
                                        </span>
                                    </div>
                                    <div class="agent-path">${escapeHtml(a.pathExe)}</div>
                                </div>
                                <div class="agent-actions">
                                    <button class="btn-icon btn-delete" onclick="event.stopPropagation(); deleteAgent('${escapeHtml(a.name)}')">🗑️</button>
                                </div>
                            </div>
                        `;
            }).join('');
        }

        async function selectAgent(name) {

            if (selectedAgentName) {
                agentStatuses.set(selectedAgentName, isAgentRunning);
            }

            if (connection) {
                try {
                    await connection.stop();
                } catch (e) { }
                connection = null;
            }

            selectedAgentName = name;
            selectedChatId = null;

            isAgentRunning = agentStatuses.get(name) || false;

            historyState = {
                offset: 0,
                limit: 50,
                total: 0,
                messages: [],
                isLoading: false,
                hasMore: true,
                chatName: name
            };

            await loadAgents();

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('btnClearHistory').style.display = 'none';

            try {
                const agent = await apiGet(`/${encodeURIComponent(name)}`);
                document.getElementById('chatAgentName').textContent = agent.name;
                document.getElementById('chatAgentIcon').textContent = '🤖';

                if (agent.id) {
                    selectedChatId = agent.id;
                }

            } catch (err) {
                showToast('Ошибка загрузки агента: ' + err.message, 'error');
            }

            updateChatStatusUI(isAgentRunning);

            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';

            await loadHistory();

            if (isAgentRunning) {
                await connectSignalR();
            }
        }

        async function deleteAgent(name) {
            if (!confirm(`Удалить агента "${name}"?`)) return;

            try {
                await apiDelete(`/${encodeURIComponent(name)}`);
                agentStatuses.delete(name);
                if (selectedAgentName === name) {
                    selectedAgentName = null;
                    selectedChatId = null;
                    isAgentRunning = false;
                    document.getElementById('chatContainer').style.display = 'none';
                    document.getElementById('welcomeScreen').style.display = 'flex';
                }
                await loadAgents();
                showToast('Агент удален', 'success');
            } catch (err) {
                showToast('Ошибка удаления: ' + err.message, 'error');
            }
        }

        async function loadHistory(loadMore = false) {
            if (!selectedAgentName) return;
            if (historyState.isLoading) return;
            if (!loadMore && historyState.messages.length > 0) return;

            const offset = loadMore ? historyState.offset : 0;

            try {
                historyState.isLoading = true;

                if (!loadMore) {
                    document.getElementById('messagesContainer').innerHTML = `
                                    <div class="message system">
                                        <div class="message-bubble">
                                            <span class="spinner" style="display:inline-block;"></span>
                                            Загрузка истории...
                                        </div>
                                    </div>
                                `;
                } else {
                    const loadBtn = document.getElementById('loadMoreBtn');
                    if (loadBtn) {
                        loadBtn.classList.add('loading');
                    }
                }

                const response = await apiPost('/history', {
                    chatName: selectedAgentName,
                    offset: offset
                });

                let messages = [];
                let pagination = { total: 0, hasMore: false };

                if (Array.isArray(response)) {
                    messages = response;
                    pagination = { total: response.length, hasMore: response.length >= 50 };
                } else if (response && typeof response === 'object') {
                    messages = response.data || response;
                    pagination = response.pagination || { total: messages.length, hasMore: false };
                }

                if (!Array.isArray(messages)) {
                    messages = [messages];
                }

                if (loadMore) {
                    historyState.messages = [...messages, ...historyState.messages];
                } else {
                    historyState.messages = messages;
                }

                historyState.offset = offset + messages.length;
                historyState.total = pagination.total || messages.length;
                historyState.hasMore = pagination.hasMore || (messages.length >= historyState.limit);

                renderMessages(historyState.messages, loadMore);

                if (historyState.messages.length > 0 && selectedChatId) {
                    document.getElementById('btnClearHistory').style.display = 'inline-block';
                } else {
                    document.getElementById('btnClearHistory').style.display = 'none';
                }

                if (historyState.hasMore && historyState.messages.length > 0) {
                    showLoadMoreButton();
                } else {
                    const loadBtn = document.getElementById('loadMoreBtn');
                    if (loadBtn) loadBtn.remove();
                }

            } catch (err) {
                showToast('Ошибка загрузки истории: ' + err.message, 'error');
                if (!loadMore) {
                    document.getElementById('messagesContainer').innerHTML = `
                                    <div class="message system">
                                        <div class="message-bubble" style="color: #f87171;">
                                            ❌ Ошибка загрузки истории: ${escapeHtml(err.message)}
                                        </div>
                                    </div>
                                `;
                }
            } finally {
                historyState.isLoading = false;
                const loadBtn = document.getElementById('loadMoreBtn');
                if (loadBtn) {
                    loadBtn.classList.remove('loading');
                }
            }
        }

        function renderMessages(messages, append = false) {
            const container = document.getElementById('messagesContainer');

            if (!append) {
                container.innerHTML = '';
            }

            if (!messages || messages.length === 0) {
                container.innerHTML = `
                                <div class="message system">
                                    <div class="message-bubble">💬 История пуста</div>
                                </div>
                            `;
                return;
            }

            if (append) {
                const scrollPos = container.scrollTop;
                const tempDiv = document.createElement('div');
                messages.forEach(msg => {
                    const msgDiv = createMessageElement(msg);
                    tempDiv.appendChild(msgDiv);
                });
                container.insertBefore(tempDiv, container.firstChild);
                const newHeight = tempDiv.offsetHeight;
                container.scrollTop = scrollPos + newHeight;
                return;
            }

            messages.forEach(msg => {
                const msgDiv = createMessageElement(msg);
                container.appendChild(msgDiv);
            });

            container.scrollTop = container.scrollHeight;
        }

        function createMessageElement(msg) {
            const div = document.createElement('div');

            const sender = msg.senderMessage || msg.sender || msg.fromMessage || msg.from || 'agent';
            const content = msg.message || msg.content || msg.text || 'пустое сообщение';
            const timestamp = msg.dateSend || msg.timestamp || msg.createdAt || new Date().toISOString();

            let type = 'agent';
            if (sender === 'user' || sender === 'User' || sender === 'USER') {
                type = 'user';
            } else if (sender === 'system' || sender === 'System') {
                type = 'system';
            }

            div.className = `message ${type}`;

            const senderLabel = type === 'user' ? '👤 Вы' :
                type === 'system' ? '⚙️ Система' : '🤖 Агент';

            const time = new Date(timestamp).toLocaleTimeString();

            div.innerHTML = `
                            <div class="message-bubble">
                                <div class="message-sender">${senderLabel}</div>
                                <div class="message-content">${escapeHtml(content)}</div>
                                <div class="message-time">${time}</div>
                            </div>
                        `;

            return div;
        }

        function showLoadMoreButton() {
            let loadBtn = document.getElementById('loadMoreBtn');
            if (!loadBtn) {
                loadBtn = document.createElement('div');
                loadBtn.id = 'loadMoreBtn';
                loadBtn.className = 'load-more-btn';
                loadBtn.innerHTML = `
                                <span class="text">📜 Загрузить ещё (${historyState.total - historyState.offset} осталось)</span>
                                <span class="spinner"></span>
                            `;
                loadBtn.onclick = () => loadHistory(true);
                const container = document.getElementById('messagesContainer');
                container.insertBefore(loadBtn, container.firstChild);
            } else {
                const textSpan = loadBtn.querySelector('.text');
                if (textSpan) {
                    textSpan.textContent = `📜 Загрузить ещё (${historyState.total - historyState.offset} осталось)`;
                }
                loadBtn.style.display = 'block';
            }
        }

        async function clearHistory() {
            if (!selectedChatId) {
                showToast('Нет ID для очистки истории', 'error');
                return;
            }
            if (!confirm('Удалить всю историю чата?')) return;

            try {
                await apiDelete(`/history/${selectedChatId}`);
                historyState.messages = [];
                historyState.offset = 0;
                historyState.total = 0;
                historyState.hasMore = false;

                document.getElementById('messagesContainer').innerHTML = `
                                <div class="message system">
                                    <div class="message-bubble">💬 История очищена</div>
                                </div>
                            `;

                document.getElementById('btnClearHistory').style.display = 'none';

                const loadBtn = document.getElementById('loadMoreBtn');
                if (loadBtn) loadBtn.remove();

                showToast('История очищена', 'success');
            } catch (err) {
                showToast('Ошибка очистки: ' + err.message, 'error');
            }
        }

        function updateChatStatusUI(running) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            const btnRun = document.getElementById('btnRun');
            const btnStop = document.getElementById('btnStop');
            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('btnSend');

            if (running) {
                dot.className = 'status-dot running';
                text.textContent = 'Работает';
                btnRun.style.display = 'none';
                btnStop.style.display = 'flex';
                input.disabled = false;
                sendBtn.disabled = false;
                input.placeholder = 'Введите запрос...';
            } else {
                dot.className = 'status-dot stopped';
                text.textContent = 'Остановлен';
                btnRun.style.display = 'flex';
                btnStop.style.display = 'none';
                input.disabled = true;
                sendBtn.disabled = true;
                input.placeholder = 'Сначала запустите агента';
            }
        }

        function updateChatStatusFull(running) {
            isAgentRunning = running;
            updateChatStatusUI(running);

            if (selectedAgentName) {
                agentStatuses.set(selectedAgentName, running);
                loadAgents();
            }
        }

        async function startAgent() {
            if (!selectedAgentName) return;

            try {
                const response = await apiPost(`/${encodeURIComponent(selectedAgentName)}/start`);

                showToast('Агент запущен', 'success');
                updateChatStatusFull(true);

                if (typeof response === 'string') {
                    addMessageToChat('agent', response);
                } else if (response && response.message) {
                    addMessageToChat('agent', response.message);
                } else {
                    addMessageToChat('agent', '✅ Агент запущен');
                }

                await connectSignalR();
            } catch (err) {
                showToast('Ошибка запуска: ' + err.message, 'error');
            }
        }

        async function stopAgent() {
            if (!selectedAgentName) return;

            try {
                await apiPost(`/${encodeURIComponent(selectedAgentName)}/stop`);
                showToast('Агент остановлен', 'info');
                updateChatStatusFull(false);
                addMessageToChat('system', '⏹ Агент остановлен');

                if (connection) {
                    await connection.stop();
                    connection = null;
                }
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                }
            } catch (err) {
                showToast('Ошибка остановки: ' + err.message, 'error');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message || !isAgentRunning || !selectedAgentName) return;

            addMessageToChat('user', message);

            input.value = '';
            input.disabled = true;
            document.getElementById('btnSend').disabled = true;
            showTyping();

            try {
                const response = await apiPost(`/${encodeURIComponent(selectedAgentName)}/command`, {
                    command: message
                });

                hideTyping();

                let agentResponse = '✅ Команда принята';
                if (typeof response === 'string') {
                    agentResponse = response;
                } else if (response && response.message) {
                    agentResponse = response.message;
                }

                addMessageToChat('agent', agentResponse);

                input.disabled = false;
                document.getElementById('btnSend').disabled = false;
                input.focus();

            } catch (err) {
                hideTyping();
                showToast('Ошибка отправки: ' + err.message, 'error');
                addMessageToChat('system', '❌ Ошибка: ' + err.message);
                input.disabled = false;
                document.getElementById('btnSend').disabled = false;
            }
        }

        async function connectSignalR() {
            if (connection && connection.state === 'Connected') return;

            try {
                if (typeof signalR === 'undefined') {
                    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js');
                }

                connection = new signalR.HubConnectionBuilder()
                    .withUrl(SIGNALR_URL, { withCredentials: true })
                    .withAutomaticReconnect()
                    .build();

                connection.on('ReceiveMessage', (data) => {
                    hideTyping();
                    const sender = data.sender || 'Agent';
                    const content = data.content || '';

                    if (sender === 'User') return;

                    if (sender === 'System') {
                        addMessageToChat('system', content);
                        return;
                    }

                    addMessageToChat('agent', content);
                    document.getElementById('chatInput').disabled = false;
                    document.getElementById('btnSend').disabled = false;
                    document.getElementById('chatInput').focus();
                });

                await connection.start();

            } catch (err) {
                startPolling();
            }
        }

        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
                if (!selectedAgentName || !isAgentRunning) return;
                try {

                } catch (err) { /* ignore */ }
            }, 2000);
        }

        function addMessageToChat(type, content, timestamp = null) {
            const container = document.getElementById('messagesContainer');

            const loadingMsg = container.querySelector('.message.system .message-bubble');
            if (loadingMsg && loadingMsg.textContent.includes('Загрузка')) {
                container.innerHTML = '';
            }

            const div = document.createElement('div');
            div.className = `message ${type}`;

            let senderLabel;
            switch (type) {
                case 'user':
                    senderLabel = '👤 Вы';
                    break;
                case 'agent':
                    senderLabel = '🤖 Агент';
                    break;
                case 'system':
                    senderLabel = '⚙️ Система';
                    break;
                default:
                    senderLabel = '🤖 Агент';
            }

            const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();

            div.innerHTML = `
                            <div class="message-bubble">
                                <div class="message-sender">${senderLabel}</div>
                                <div class="message-content">${escapeHtml(content)}</div>
                                <div class="message-time">${time}</div>
                            </div>
                        `;

            const loadBtn = document.getElementById('loadMoreBtn');
            if (loadBtn) {
                container.insertBefore(div, loadBtn);
            } else {
                container.appendChild(div);
            }

            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            hideTyping();
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = 'message agent typing';
            div.id = 'typingIndicator';
            div.innerHTML = `
                            <div class="message-bubble">
                                <div class="typing-indicator">
                                    <span></span><span></span><span></span>
                                </div>
                            </div>
                        `;

            const loadBtn = document.getElementById('loadMoreBtn');
            if (loadBtn) {
                container.insertBefore(div, loadBtn);
            } else {
                container.appendChild(div);
            }

            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                            <span>${escapeHtml(message)}</span>
                            <button class="toast-close" onclick="this.closest('.toast').remove()">✕</button>
                        `;

            document.body.appendChild(toast);

            const timer = setTimeout(() => {
                if (toast.parentNode) {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 5000);

            toast.addEventListener('mouseenter', () => clearTimeout(timer));
            toast.addEventListener('mouseleave', () => {
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.style.opacity = '0';
                        toast.style.transition = 'opacity 0.3s';
                        setTimeout(() => toast.remove(), 300);
                    }
                }, 3000);
            });
        }

        function openCreateModal() {
            document.getElementById('createModal').classList.add('open');
            document.getElementById('agentNameInput').value = '';
            document.getElementById('agentPathInput').value = '';
            document.getElementById('agentNameInput').focus();
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('open');
        }

        async function createAgent() {
            const name = document.getElementById('agentNameInput').value.trim();
            const pathExe = document.getElementById('agentPathInput').value.trim();

            if (!name || !pathExe) {
                showToast('Заполните название и путь к .exe', 'error');
                return;
            }

            const btn = document.getElementById('btnCreateAgent');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Создание...';

            try {
                await apiPost('', { name, pathExe });
                closeCreateModal();
                await loadAgents();
                showToast('Агент создан!', 'success');
            } catch (err) {
                showToast('Ошибка: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Создать';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadAgents();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeCreateModal();
        });

        document.getElementById('createModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeCreateModal();
        });
    </script>
</body>
</html>
